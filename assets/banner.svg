<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Sleuth - AI Payment Fraud Investigator - deterministic, explainable payment-fraud investigations">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1322"/>
      <stop offset="0.55" stop-color="#161019"/>
      <stop offset="1" stop-color="#2a0e14"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ffce8f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5a524" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#f5a524" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="url(#bg)"/>

  <!-- faint grid -->
  <g stroke="#2a2230" stroke-width="1" opacity="0.55">
    <line x1="0" y1="90" x2="1280" y2="90"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="230" x2="1280" y2="230"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="640" y1="0" x2="640" y2="360"/>
    <line x1="800" y1="0" x2="800" y2="360"/>
    <line x1="960" y1="0" x2="960" y2="360"/>
    <line x1="1120" y1="0" x2="1120" y2="360"/>
  </g>

  <!-- transaction graph motif (faint nodes + edges) -->
  <g opacity="0.5" stroke="#5a4a3a" stroke-width="1.5" fill="#3a2f26">
    <line x1="880" y1="250" x2="980" y2="300"/>
    <line x1="980" y1="300" x2="1120" y2="290"/>
    <line x1="880" y1="250" x2="940" y2="180"/>
    <line x1="940" y1="180" x2="1040" y2="120"/>
    <circle cx="880" cy="250" r="6"/>
    <circle cx="980" cy="300" r="6"/>
    <circle cx="1120" cy="290" r="6"/>
    <circle cx="940" cy="180" r="6"/>
  </g>
  <!-- flagged node -->
  <circle cx="1040" cy="120" r="34" fill="url(#glow)"/>
  <circle cx="1040" cy="120" r="7" fill="#f87171"/>

  <!-- magnifying glass -->
  <g stroke="#f5a524" stroke-width="8" fill="none" stroke-linecap="round">
    <circle cx="1110" cy="175" r="62" fill="#120d12"/>
    <line x1="1156" y1="221" x2="1206" y2="271"/>
  </g>
  <!-- risk spike inside the lens -->
  <polyline points="1072,185 1092,185 1102,150 1118,205 1130,175 1150,175"
            fill="none" stroke="#f87171" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- eyebrow -->
  <text x="82" y="92" font-family="Consolas, 'SFMono-Regular', Menlo, monospace" font-size="15"
        letter-spacing="4" fill="#e0a35a">AI PAYMENT FRAUD INVESTIGATOR &#8226; DETERMINISTIC &#8226; HUMAN-REVIEW GATED</text>

  <!-- title -->
  <text x="80" y="158" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="62"
        font-weight="700" fill="url(#title)">Sleuth</text>

  <!-- tagline -->
  <text x="82" y="202" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="23"
        fill="#c7b6a6">Explainable, deterministic payment-fraud investigations end to end</text>

  <!-- feature pills -->
  <g font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16">
    <rect x="82" y="238" rx="16" ry="16" width="150" height="36" fill="#221820" stroke="#3d2c22"/>
    <text x="157" y="262" text-anchor="middle" fill="#ffd9a0">Deterministic</text>

    <rect x="246" y="238" rx="16" ry="16" width="206" height="36" fill="#221820" stroke="#3d2c22"/>
    <text x="349" y="262" text-anchor="middle" fill="#f0d3b6">Tokenized card refs</text>

    <rect x="466" y="238" rx="16" ry="16" width="206" height="36" fill="#221820" stroke="#3d2c22"/>
    <text x="569" y="262" text-anchor="middle" fill="#f0d3b6">Human-review gates</text>
  </g>
</svg>
